name: Feature Request
description: Suggest an idea, feature, or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting an idea. It helps make the CLI better.
  - type: textarea
    attributes:
      label: What is the problem this would solve and/or feature it would enhance?
    validations:
      required: true
  - type: textarea
    attributes:
      label: What you are proposing to solve the problem and/or enhance the feature?
    validations:
      required: true