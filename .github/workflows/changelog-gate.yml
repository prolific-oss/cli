name: Changelog gate

# Runs on pull_request: opened (PR created), synchronize (new commits pushed to the PR
# branch), reopened, labeled/unlabeled (release label added or removed). No bare `push`
# trigger — pushes before a PR exists have no PR metadata to validate.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: changelog-gate-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  require-changelog-if-release:
    if: github.head_ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Require CHANGELOG.md when release label is present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if ! gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json labels -q '.labels[].name' | grep -Fxq 'release'; then
            echo "PR does not have 'release' label; check passed."
            exit 0
          fi
          if ! gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json files -q '.files[].path' | grep -Fxq 'CHANGELOG.md'; then
            echo "::error::PR has 'release' label but CHANGELOG.md is not modified in this PR. Run \`make changelog VERSION=x.y.z\` (or edit CHANGELOG.md) and push before merging."
            exit 1
          fi
          echo "CHANGELOG.md is included in this PR; check passed."
