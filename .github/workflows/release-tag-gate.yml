name: Release tag gate

# Catches common mistakes in the PR title so they match .github/workflows/create-release.yml
# (case-sensitive [run-release]). Does not enforce CHANGELOG.md — see changelog-gate.yml.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-tag-gate-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-release-tag:
    if: github.head_ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate [run-release] spelling and casing
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          TITLE=$(printf '%s' "${PR_TITLE}")

          fail() {
            echo "::error::$1"
            exit 1
          }

          if printf '%s' "$TITLE" | grep -Fq '[run-release]'; then
            echo "PR title contains valid [run-release] tag."
            exit 0
          fi

          if printf '%s' "$TITLE" | grep -qiE '\[run-release\]' && ! printf '%s' "$TITLE" | grep -Fq '[run-release]'; then
            fail "Release tag must be exactly [run-release] (all lowercase). Other casings will not trigger the release workflow."
          fi

          if printf '%s' "$TITLE" | grep -qE '\[[Rr]un[ _][Rr]elease\]'; then
            fail "Use [run-release] with a hyphen between run and release (not a space or underscore)."
          fi

          if printf '%s' "$TITLE" | grep -Fq '[skip-release]'; then
            fail "Found [skip-release]. To run the release workflow after merge, use exactly [run-release] in the PR title."
          fi

          if printf '%s' "$TITLE" | grep -qE '\[run-releases\]'; then
            fail "Use singular [run-release], not [run-releases]."
          fi

          if printf '%s' "$TITLE" | grep -qE '\[run-(releas|relese|relesae|relase|releease|releasse|releasee)\]'; then
            fail "Title looks like a typo of [run-release]. Check spelling (release)."
          fi

          echo "PR title has no [run-release] tag; tag validation not applicable."
