name: Go
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    strategy:
      matrix:
        # Label only — kept as 1.26.x to match the "Build (1.26.x)" required
        # status check on main. actions/setup-go below is pinned to the exact
        # patch version go.mod requires, since GitHub's setup-go version
        # manifest can lag behind new Go releases.
        go-version: [1.26.x]
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.5
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Get dependencies
        run: |
          make install

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.11.2
          args: --verbose

      - name: Lint Dockerfile
        run: |
          make lint-dockerfile

      - name: Build
        run: |
          make build

      - name: Test
        run: |
          make test
