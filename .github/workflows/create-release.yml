name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize-release:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, '[run-release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod

      - name: Extract version from CHANGELOG
        id: version
        run: |
          set -euo pipefail
          VERSION=$(go run ./scripts/changelog extract-version)
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Finalizing release ${TAG} (from CHANGELOG.md)"

      - name: Extract changelog notes
        run: |
          go run ./scripts/changelog extract \
            --section "${{ steps.version.outputs.version }}" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::No changelog entry found. Release notes will be empty."
          fi

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md
