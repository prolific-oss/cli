      parameters:
        - name: id
          in: path
          description: Study id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Study"
      summary: Retrieve a study
      security: *ref_0
    delete:
      description: Published studies cannot be deleted, but you can delete draft studies.
      operationId: studies_DeleteStudy
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          description: Study id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: ""
      summary: Delete a study
      security: *ref_0
    patch:
      description: >-
        You can update any field for a draft study.


        Once the study has been published only the following fields can be
        updated with some restrictions:

        - internal_name: Internal name of the study, not shown to participants

        - total_available_places: Only increasing is allowed. A completed study
        will become active again and resume recruiting of participants. For more
        information, check the
        [guide](https://researcher-help.prolific.com/en/articles/445201-how-do-i-increase-places-on-a-study)

        - access_details: Sending an access_detail will add a new task and
        increase overall study places by the number in the total_allocation
        field. Sending both access_details and total_available_places will
        increase places on existing URLs by the number specified on the
        access_detail.

        - data_collection_metadata.annotators_per_task: For AI Task Builder
        Batch studies, you can increase the number of annotators per task. This
        will automatically recalculate `total_available_places` based on the
        number of task groups multiplied by the new value. Note: This value can
        only be increased, not decreased, on a published study.

        - submissions_config: This allows you to update the
        max_submissions_per_participant, max_concurrent_submissions, or
        auto_rejection_categories. Please note decreasing
        max_submissions_per_participant will not affect submissions that have
        already been created.
      operationId: studies_UpdateStudy
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          description: Study id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Study"
      summary: Update a study
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaseStudy"
  /api/v1/studies/{id}/transition/:
    post:
      description: >-
        Transition a study between statuses using one of the available actions.


        The following transitions are available:


        | Current Status | Action | Resulting Status |

        |---|---|---|

        | UNPUBLISHED | PUBLISH | ACTIVE |

        | UNPUBLISHED | SCHEDULE_PUBLISH | SCHEDULED |

        | SCHEDULED | CANCEL_PUBLISH | UNPUBLISHED |

        | ACTIVE | PAUSE | PAUSED |

        | ACTIVE | STOP | COMPLETED |

        | PAUSED | START | ACTIVE |

        | PAUSED | STOP | COMPLETED |


        **Action details:**

        - **PUBLISH**: Publish a draft study so participants can take part. The
        study must be fully configured.

        - **SCHEDULE_PUBLISH**: Schedule a draft study to be published at a
        future time. A `publish_at` field (ISO 8601 datetime) must be set either
        on the study or provided in this request.

        - **CANCEL_PUBLISH**: Cancel a scheduled publication, returning the
        study to draft.

        - **PAUSE**: Temporarily pause an active study. Participants already
        taking part can still complete, but no new participants will be
        recruited.

        - **START**: Resume a paused study.

        - **STOP**: Stop a study completely. To make it active again you will
        need to increase the number of places.


        To learn more about it check out [help
        center](https://researcher-help.prolific.com/en/articles/445200-pausing-stopping-a-study)
      operationId: studies_PublishStudy
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          description: Study id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Study"
      summary: Transition a study's status
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  $ref: "#/components/schemas/StudyTransitionAction"
                  description: The transition action to execute on the study.
                publish_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: >-
                    ISO 8601 datetime for when the study should be published.
                    Required in the request when action is SCHEDULE_PUBLISH and
                    the study does not already have a publish_at set.
              required:
                - action
