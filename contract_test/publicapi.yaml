  /api/v1/studies/{id}/:
    get:
      description: >-
        Retrieve a study by id. If you are polling the API for updates to a
        study, consider using a [Hook](#tag/Hooks). We will call your endpoint
        when certain events occur on your study, such as new completed
        submissions or changes in status.
      operationId: studies_GetStudy
      tags:
