  /api/v1/studies/{id}/export/:
    get:
      description: >-
        <span  style="font-size:x-large">**Deprecated - please use the new
        [Demographic
        Export](https://docs.prolific.com/docs/api-docs/public/#tag/Studies/operation/ExportDemographicData)
        endpoint instead.**</span>


