              schema: {}
        "403":
          description: ""
          content:
            application/json:
              schema: {}
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "502":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
      summary: Create credential pool
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                credentials:
                  type: string
                  description: CSV-formatted credentials (username,password per line)
                workspace_id:
