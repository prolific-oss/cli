                  $ref: "#/components/schemas/TaskDetails"
                collection_items:
                  type: array
                  items:
                    $ref: "#/components/schemas/CollectionItemInput"
                  description: >-
                    Pages within the collection. Include `id` to preserve
                    existing items.
              required:
                - name
                - task_details
