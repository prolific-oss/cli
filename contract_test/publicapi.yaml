                  description: >-
                    List of filters to apply to the count. This parameter uses
                    the new, simplified

                    filters schema for interacting with eligibility.
                workspace_id:
                  type: string
                  nullable: true
                  description: >-
                    The ID of the workspace you will be creating a study in.


