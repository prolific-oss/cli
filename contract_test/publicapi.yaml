        - Sex (as recorded on legal/official documents)

        - Ethnicity (simplified)

        - First language

        - Current country of residence

        - Nationality

        - Country of birth

        - Student status

        - Employment status

        - Reviewed at date-time (UTC, ISO 8601 formatted)

        - Completion code ('entered code')

        - Total approvals


        **Additional columns when filters are provided:**

