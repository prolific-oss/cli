  /api/v1/reward-recommendations/:
    get:
      description: >-
        Calculate the recommended participant reward rates for a data
        collection, optionally based upon a given set of filters
      operationId: rewardRecommendations_CalculateRewardRecommendations
      tags:
        - RewardRecommendations
      parameters:
        - name: workspace_id
          in: query
          description: The ID of the workspace in which you'll be creating the study
          required: true
          schema:
            type: string
        - name: currency
          in: query
          description: >-
            An ISO 4217 currency code. Note that we only support a selection of
            currency codes as per the enum values.
          required: true
          schema:
            $ref: "#/components/schemas/CalculateRewardRecommendationsRequestCurrency"
        - name: screener_ids
          in: query
          description: >-
            A URL-encoded, comma-delimited list of filter IDs (e.g. custom group
            filter IDs) that you plan to apply to your study.


            There are various methods of converting an array of filter IDs to a
            URL-encoded, comma delimited array e.g:


            JavaScript:


            ```js

            const screenerIDs = ["mandarin", "spanish"];

            const encodedScreenerIDs =
            encodeURIComponent(screenerIDs.join(","));

            const url =
            `https://api.prolific.com/api/v1/reward-recommendations?screener_ids=${encodedScreenerIDs}&workspace_id=<workspace
            ID>&currency=GBP`

            ```


            Python:


            ```python

            import urllib.parse


            screener_ids = ["mandarin", "spanish"]

            encoded_screener_ids = urllib.parse.quote(",".join(screener_ids))

            url =
            f"https://api.prolific.com/api/v1/reward-recommendations?screener_ids={encoded_screener_ids}&workspace_id=<workspace
            ID>&currency=GBP"

            ```
          required: false
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: >-
            A list of reward recommendations. We suggest using the first
            recommendation in the list as this is guaranteed to be the most
            recent set of reward rates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardRecommendationsResponse"
      summary: Calculate reward recommendations
      security: *ref_0
  /.well-known/study/jwks.json:
    get:
      description: >-
        Fetches the public keys that can be used to verify JWTs signed by
        Prolific. Clients should cache these keys and update them at least
        daily.


        To verify the signature of a JWT you must verify the following:

        * The JWT signature is authentic by verifying it with the public key
        from Prolific that correlates with the KID.

        * The JWT hasn't expired, by checking the `exp` claim.

        * The `aud` claim is the correct domain for your tool.

        * The `prolific` claim matches your expected payload as set in the
        `external_study_url` property. It always includes `workspace_id`. When
        the workspace is linked to an organisation, it also includes
        `organisation_id`.
      operationId: wellKnownEndpoints_getStudyJwks
      tags:
        - WellKnownEndpoints
      parameters: []
      responses:
        "200":
          description: Successful response with the JWKS.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
      summary: Retrieve JSON Web Key Set (JWKS)
  /api/v1/submissions/:
    get:
      description: >-
        Returns basic information of submissions, including study id,
        participant id, status and start timestamp.


        **Filtering and Ordering:**

        - Filter by status, completion state, dates, and study

        - Order by start time, reward amount, or study name

        - Paginate by page_size and page (Default page_size is 20)

        - Boolean parameters accept multiple formats: 1/0, true/false, yes/no,
        t/f (case-insensitive)

        - Date parameters use DD/MM/YYYY format

        - Status parameters are case-insensitive with underscore normalization
      operationId: submissions_GetSubmissions
      tags:
        - Submissions
      parameters:
        - name: study
          in: query
          description: >-
            Optional filter by study ID. This is the ID we pass to the survey
            platform using %STUDY_ID%
          required: false
          schema:
            type: string
            nullable: true
        - name: status
          in: query
          description: >-
            Filter by submission status (case-insensitive). Valid values include
            ACTIVE, AWAITING_REVIEW, APPROVED, REJECTED, RETURNED, SCREENED_OUT,
            TIMED-OUT
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestStatus"
            nullable: true
        - name: completed
          in: query
          description: >-
            Filter by completion status. Accepts 1/true/yes/t for completed,
            0/false/no/f for incomplete (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestCompleted"
            nullable: true
        - name: returned
          in: query
          description: >-
            Filter by returned status. Accepts 1/true/yes/t for returned,
            0/false/no/f for not returned (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestReturned"
            nullable: true
        - name: awaiting_review
          in: query
          description: >-
            Filter by awaiting review status. Accepts 1/true/yes/t for awaiting
            review, 0/false/no/f for not awaiting review (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestAwaitingReview"
            nullable: true
        - name: approved
          in: query
          description: >-
            Filter by approved status. Accepts 1/true/yes/t for approved,
            0/false/no/f for not approved (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestApproved"
            nullable: true
        - name: active
          in: query
          description: >-
            Filter by active status. Accepts 1/true/yes/t for active,
            0/false/no/f for not active (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestActive"
            nullable: true
        - name: timeout
          in: query
          description: >-
            Filter by timed out status. Accepts 1/true/yes/t for timed out,
            0/false/no/f for not timed out (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestTimeout"
            nullable: true
        - name: rejected
          in: query
          description: >-
            Filter by rejected status. Accepts 1/true/yes/t for rejected,
            0/false/no/f for not rejected (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestRejected"
            nullable: true
        - name: screened_out
          in: query
          description: >-
            Filter by screened out status. Accepts 1/true/yes/t for screened
            out, 0/false/no/f for not screened out (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestScreenedOut"
            nullable: true
        - name: completeoractive
          in: query
          description: >-
            Filter for submissions that are either completed or active. Accepts
            1/true/yes/t to include, 0/false/no/f to exclude (case-insensitive)
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestCompleteoractive"
            nullable: true
        - name: submitted_from
          in: query
          description: >-
            Filter submissions completed after the given date. Format DD/MM/YYYY
            (e.g., 01/01/2024)
          required: false
          schema:
            type: string
            pattern: ^[0-3][0-9]/[0-1][0-9]/[0-9]{4}$
            nullable: true
        - name: submitted_before
          in: query
          description: >-
            Filter submissions completed before the given date. Format
            DD/MM/YYYY (e.g., 31/12/2024)
          required: false
          schema:
            type: string
            pattern: ^[0-3][0-9]/[0-1][0-9]/[0-9]{4}$
            nullable: true
        - name: ordering
          in: query
          description: >-
            Order results by field. Prefix with '-' for descending order.
            Supported values are started_at, submission_reward, study_name
          required: false
          schema:
            $ref: "#/components/schemas/GetSubmissionsRequestOrdering"
            nullable: true
        - name: page_size
          in: query
          description: Number of items to return per page (Default 20)
          required: false
          schema:
            type: integer
            nullable: true
        - name: page
          in: query
          description: Page number to retrieve (Default 1)
          required: false
          schema:
            type: integer
            nullable: true
      responses:
        "200":
          description: List submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionListResponse"
      summary: List submissions
      security: *ref_0
  /api/v1/submissions/{id}/:
    get:
      description: |-
        Returns the detailed information of a submission, including the
        study id, participant id, status and start timestamp
      operationId: submissions_GetSubmission
      tags:
        - Submissions
      parameters:
        - name: id
          in: path
          description: |-
            Submission id. This is the ID we pass to the survey platform
            using %SESSION_ID%
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionDetail"
      summary: Retrieve a submission
      security: *ref_0
  /api/v1/submissions/{id}/transition/:
    post:
      description: >-
        Transition a submission to `APPROVED`, `REJECTED`, `PARTIALLY APPROVED`,
        `AWAITING REVIEW` or `SCREENED OUT`. Once the status is changed, it can
        not be restored to its previous value.


        You can only transition a submission to PARTIALLY APPROVED or SCREENED
        OUT by:
          - setting up the study with the appropriate completion codes (only some workspaces have access to these features)
          - providing the correct completion code in the request body
          - providing the necessary data in the request body (to PARTIALLY APPROVE a submission)

        Note this endpoint is idempotent, so if you make the same request twice,
        the second request will be ignored.
      operationId: submissions_TransitionSubmission
      tags:
        - Submissions
      parameters:
        - name: id
          in: path
          description: |-
            Submission id. This is the ID we pass to the survey platform
            using %SESSION_ID%
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
      summary: Approve or reject a submission
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  $ref: "#/components/schemas/SubmissionTransitionAction"
                  description: The action that should be performed on the submission.
                message:
                  type: string
                  nullable: true
                  description: >-
                    Required if action is 'REJECT'. Message sent to the
                    participant

                    explaining the reason for the rejection.

                    It must be at least 100 chars long.
                rejection_category:
                  $ref: "#/components/schemas/SubmissionTransitionRejectionCategory"
                  nullable: true
                  description: |-
                    Required if action is 'REJECT', it sums as the category of
                    the rejection.
                completion_code:
                  type: string
                  nullable: true
                  description: >-
                    Required if the action is 'COMPLETE'. The completion code
                    must match a value provided when creating the study, and the
                    actor must have been set to `researcher`. Any actions that
                    were provided during the set up of the completion code (e.g.
                    automatically approve) will then be carried out.
                completion_code_data:
                  $ref: "#/components/schemas/SubmissionTransitionCompletionCodeData"
                  nullable: true
                  description: >-
                    Required if the action is 'COMPLETE' and the code has the
                    action "DYNAMIC_PAYMENT" associated with it.
              required:
                - action
  /api/v1/submissions/{id}/request-return/:
    post:
      description: >-
        **This is an experimental feature that may be subject to change in the
        future.** <br/>

        It offers researchers the ability to ask a participant to return a
        submission. The return reason must be provided in the request and can be
        any free text string. <br/> The Prolific UI allows users to select any
        of the following options:

        * Didn't finish the study

        * Encountered technical problems

        * Withdrew consent

        * Other ( uses the free text input)


        This constructs a message around the reasons provided so there is no
        need to provide additional text beyond the reasons.

        <img alt="Example" src="/assets/img/api/message.png" />
      operationId: submissions_RequestSubmissionReturn
      tags:
        - Submissions
      parameters:
        - name: id
          in: path
          description: The submission id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: >-
            A message is sent to the participant belonging to the submission
            asking them to return.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnRequestedResponse"
      summary: >-
        Request the participant who submitted the response to return their
        response
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_return_reasons:
                  type: array
                  items:
                    type: string
              required:
                - request_return_reasons
  /api/v1/submissions/{id}/demographics/:
    get:
      description: >-
        ### Overview

        Retrieves demographic data for a specific submission, reflecting a
        snapshot of the participant's demographics at the time of submission
        completion.


        ### Data Source

        - Demographic data is retrieved from archives and is not generated
        on-the-fly

        - If no archived demographic data exists for the submission, a 404
        response will be returned


        ### Data Format

        - The demographic dataset is dynamic and evolves as questions are added
        or removed

        - For questions that weren't answered by the participant, the value will
        be `DATA_EXPIRED`

        - Fields may include standard demographic information such as age range,
        gender, education level, etc.


        This feature is only available to specific workspaces.
      operationId: submissions_GetSubmissionDemographics
      tags:
        - Submissions
      parameters:
        - name: id
          in: path
          description: The submission id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Demographic data for the submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionDemographicsResponse"
        "404":
          description: ""
          content:
            application/json:
              schema: {}
      summary: Download demographic data for a single submission
      security: *ref_0
  /api/v1/submissions/bulk-approve/:
    post:
      description: >-
        Bulk approve study submissions to pay participants after they have

        completed your survey or experiment. There are two variant payloads to

        this request.


        - You can supply a Study ID, and a list of participant IDs, or

        - You can provide a list of submission IDs


        We strongly recommend that you provide a list of submission IDs. These
        submissions do not need to be from the same study.


        We recommend a maximum of 1,000 submission or participant IDs per
        request.
      operationId: submissions_BulkApproveSubmissions
      tags:
        - Submissions
      parameters: []
      responses:
        "200":
          description: Bulk approve in progress
          content:
            application/json:
              schema:
                type: string
      summary: Bulk approve submissions
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkApproveSubmissionsRequest"
  /api/v1/submissions/bonus-payments/:
    post:
      description: >-
        Set up bonus payments to one or more participants/submissions in a
        study.


        You need the study id, the participant|submission ids and the request in
        CSV format.


        The csv_bonuses field needs to be structured in the format of either:


        - `<participant_id>,<amount>\n`.

        - `<submission_id>,<amount>\n`.


        **Note: The amount will be in the study currency. The amount should be a
        decimal value, e.g. 1.50 for £1.50.**

        Warning: An amount of 30 will pay £/$30.00.


        As an example, `60ffe5c8371090c7041d43f8,4.25` would be a bonus of £4.25
        for participant 60ffe5c8371090c7041d43f8 in a study with GBP currency.


        Setting up a bonus payment does not actually pay them, to do so check
        [/api/v1/bulk-bonus-payments/{id}/pay/](#tag/Bonuses/paths/~1api~1v1~1bulk-bonus-payments~1%7Bid%7D~1pay~1/post)


        The submission and participant IDs need to have taken part in the study
        in order for this call to be successful.

        If not, you will get a "400" HTTP response back, which explains which
        IDs are incorrect.


        We recommend a maximum of 200 participant or submission IDs per request.
      operationId: bonuses_CreateBonusPayments
      tags:
        - Bonuses
      parameters: []
      responses:
        "201":
          description: Bonus created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkBonus"
      summary: Set up bonuses
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                study_id:
                  type: string
                  nullable: true
                csv_bonuses:
                  type: string
                  nullable: true
  /api/v1/bulk-bonus-payments/{id}/pay/:
    post:
      description: >-
        Bonus payments are made asynchronously.

        The payment will be done in the following minutes and your balance will
        be updated accordingly.


        <Warning>

        This endpoint is **not idempotent**. Sending multiple requests with the
        same bulk bonus payment ID will result in participants being paid
        multiple times. Ensure you send this request only once per bulk payment.

        </Warning>
      operationId: bonuses_PayBonusPayments
      tags:
        - Bonuses
      parameters:
        - name: id
          in: path
          description: Bulk bonus payment id
          required: true
          schema:
            type: string
      responses:
        "202":
          description: >-
            Successfully received bonus payments request. The bonuses will be
            paid asynchronously.
          content:
            application/json:
              schema:
                type: string
      summary: Pay bonuses
      security: *ref_0
  /api/v1/users/me/:
    get:
      description: >-
        Use this endpoint to test your token and retrieve the basic information
        of your account.


        Add an `Authorization` header with the value `Token <your token>`.
      operationId: users_GetUser
      tags:
        - Users
      parameters: []
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
      summary: Retrieve a user
      security: *ref_0
  /api/v1/researchers/participants/:
    post:
      description: >-
        ### Overview

        Creates a test participant with the same details as the researcher and
        the supplied email. This participant will

        bypass any fraud checks and on-boarding steps.


        ### Enabling the feature

        This endpoint is only enabled for select workspaces and will need
        enabling before the endpoint can be used.


        ### Participant Limitations

        - The participant will be limited to take studies only in the workspaces
        associated to the researcher and where

        the feature is enabled.

        - The participant will not be able to cashout any balance earned from
        completing studies.


        ### Usage

        - The API response contains the participant ID. This can be used in a
        custom allowlist or participant group to

        target the participant on studies. This enables the researcher to test
        the study set up end-to-end.

        - A randomly generated password is assigned to the participant account.
        We recommend that you request to reset

        the password, and use this new password to login to the participant
        account.
      operationId: users_CreateTestParticipantForResearcher
      tags:
        - Users
      parameters: []
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/CreateTestParticipantForResearcherResponse
      summary: Create a test participant for a researcher
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: >-
                    - The email of the test participant.

                    - This cannot be an email that has been registered with
                    Prolific already.
              required:
                - email
  /api/v1/participant-groups/:
