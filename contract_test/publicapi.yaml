            Number of options that can be selected (required for multiple_choice
            and multiple_choice_with_free_text). Use 1 for single-select, -1 for
            unlimited.
        disable_dropdown:
          type: boolean
          nullable: true
          description: >-
            When true, always renders checkbox/radio elements instead of a
            dropdown select.
        options:
          type: array
          items:
            $ref: >-
              #/components/schemas/UpdateTaskBuilderInstructionsRequestInstructionsItemOptionsItem
          nullable: true
          description: >-
            The options (required for multiple_choice and
            multiple_choice_with_free_text).
        unit_options:
          type: array
          items:
            $ref: >-
              #/components/schemas/UpdateTaskBuilderInstructionsRequestInstructionsItemUnitOptionsItem
          nullable: true
