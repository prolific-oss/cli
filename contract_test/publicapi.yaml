  /api/v1/studies/{id}/demographic-export/:
    post:
      description: >-
        Create and download a demographic export for a study. This endpoint
        allows you to export participant demographic data with optional study
        filter data.


        **Filter Support**: This endpoint supports applying demographic filters
        to export data for participants who match specific criteria.


        When filters are provided, the export includes both base demographic
        data (age, sex, country, etc.) and the filters.


        When no filters are provided, the export includes only base demographic
        data for all participants who took the study, excluding any
        study-specific filter responses.


        **Export Usage**: Please note that you may only select up to 15 filters
        per export. You are also limited to 2 different filter export requests.


        You may download the same request as many times as you need. To check
        your current usage and see your latest export history, use the
        [Demographic Export
        History](https://docs.prolific.com/docs/api-docs/public/#tag/Studies/operation/GetDemographicExportHistory)
        endpoint.


        **Basic Data Included**: The export includes the following data fields:

        * Submission ID

        * Participant ID

        * Submission status

        * Started date-time
          * Expressed in UTC
          * ISO 8601 formatted
        * Completed date-time
          * Expressed in UTC
          * ISO 8601 formatted
        * Time taken (in seconds)

        * Age

        * Sex
          * Participants were asked the following question: What is your sex, as recorded on legal/official documents?
        * Ethnicity (simplified)

        * First language

        * Current country of residence

        * Nationality

        * Country of birth

        * Student status

        * Employment status

        * Reviewed at date-time
          * Expressed in UTC
          * ISO 8601 formatted
        * Completion code ('entered code')

        * Total approvals


        Learn more on [Exporting Prolific demographic
        data](https://researcher-help.prolific.com/en/article/b2943f).
      operationId: studies_ExportDemographicData
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          description: Study ID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: ""
      summary: Export demographic data
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    $ref: "#/components/schemas/DemographicExportRequestFiltersItem"
                  nullable: true
                  description: >-
                    List of filters to apply to the demographic export.


                    When filters are provided, the export includes both base
                    demographic data and responses to the specified filters
                    which were applied to the study.


                    When empty, only base demographic data (age, sex, country,
                    etc.) for all participants who took the study is exported,
                    excluding study-specific filter responses.
  /api/v1/studies/{id}/demographic-export-history/:
    get:
      description: >-
        Retrieve the latest demographic export request history for a study. This
        endpoint returns information about your most recent export request,
        including the filters used and the total number of export combinations
        made.


        **Usage**: Use this endpoint to check your current export usage and see
        what filters were used in your latest request. This helps you understand
        your remaining export quota and track your export history.


        **Export Limits**: You are limited to 2 different filter combinations
        per study. This endpoint helps you track your usage against this limit.


        Learn more on [Exporting Prolific demographic
        data](https://researcher-help.prolific.com/en/article/b2943f).
      operationId: studies_GetDemographicExportHistory
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          description: Study ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export history retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemographicExportHistoryResponse"
      summary: Get demographic export history
      security: *ref_0
  /api/v1/studies/{id}/clone/:
    post:
      description: >-
        Duplicating a study can save a lot of time and effort compared to
        creating a new study from scratch, since all of the information and data
        from the original study will be carried over to the new study.
        Additionally, duplicating a study can help ensure that the new study is
        set up consistently with the original, reducing the risk of errors or
        inconsistencies.


        To prevent repeat participation, a block list containing the original
        study will be added to the duplicated study's filters unless
        `block_previous_participants` is set to `false` in the request body.
      operationId: studies_DuplicateStudy
      tags:
        - Studies
      parameters:
        - name: id
          in: path
          description: Study id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Duplicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Study"
      summary: Duplicate a study
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                block_previous_participants:
                  type: boolean
                  nullable: true
                  description: Controls whether the block list is added or not.
  /api/v1/studies/{study_id}/predicted-recruitment-time/:
    get:
      description: >-
        Returns the predicted recruitment time for the study if it was published
        right now, based on a machine learning model.

        The recruitment time is the time from publish to the time when the final
        participant starts their submission.

        It does not account for the time to complete the submission.
      operationId: studies_GetStudyPredictedRecruitmentTime
      tags:
        - Studies
      parameters:
        - name: study_id
          in: path
          description: Study id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Return the predicted recruitment time for the study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyPredictedRecruitmentTimeResponse"
      summary: Show Study predicted recruitment time
      security: *ref_0
  /api/v1/studies/predicted-recruitment-time/:
    post:
      description: >-
        Returns the predicted recruitment time for a study that has not even
        been saved as a draft if it was published right now, based on a machine
        learning model.

        The recruitment time is the time from publish to the time when the final
        participant starts their submission.

        It does not account for the time to complete the submission.
      operationId: studies_PostStudyPredictedRecruitmentTime
      tags:
        - Studies
      parameters: []
      responses:
        "200":
          description: Return the predicted recruitment time for the study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyPredictedRecruitmentTimeResponse"
      summary: Show Study predicted recruitment time
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    $ref: >-
                      #/components/schemas/StudyPredictedRecruitmentTimeRequestFiltersItem
                  description: >-
                    List of filters to apply to the count. This parameter uses
                    the new, simplified

                    filters schema for interacting with eligibility.
                workspace_id:
                  type: string
                  description: The ID of the workspace the study will be created in.
                reward:
                  type: number
                  format: double
                  description: >-
                    How much are you going to pay the participants in cents. We
                    use the currency of the workspace
                study_type:
                  $ref: >-
                    #/components/schemas/StudyPredictedRecruitmentTimeRequestStudyType
                  description: Type of study.
                total_available_places:
                  type: number
                  format: double
                  description: How many participants are you looking to recruit
                estimated_completion_time:
                  type: number
                  format: double
                  description: Estimated duration in minutes of the experiment or survey
                device_compatibility:
                  type: array
                  items:
                    $ref: >-
                      #/components/schemas/StudyPredictedRecruitmentTimeRequestDeviceCompatibilityItem
                  nullable: true
                  description: |-
                    Add all devices that participants can use.
                    You can include one or more options.
                peripheral_requirements:
                  type: array
                  items:
                    $ref: >-
                      #/components/schemas/StudyPredictedRecruitmentTimeRequestPeripheralRequirementsItem
                  nullable: true
                  description: Add all requirements that participants have to meet.
                study_labels:
                  $ref: >-
                    #/components/schemas/StudyPredictedRecruitmentTimeRequestStudyLabels
                  nullable: true
                  description: The field that the study is about to get tagged with.
              required:
                - filters
                - workspace_id
                - reward
                - study_type
                - total_available_places
                - estimated_completion_time
  /api/v1/study-cost-calculator/:
