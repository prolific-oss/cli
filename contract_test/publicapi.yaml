  /api/v1/data-collection/batches/{batch_id}/duplicate:
    post:
      description: >-
        Create a duplicate of an existing AI Task Builder batch. The dataset
        does not need to be in READY status for duplication. Supports two modes:

        - Duplicate with dataset (default): Creates a copy with the same dataset
        (the dataset is shared between both batches, not duplicated)

        - Duplicate without dataset: Creates a copy that requires a new dataset
        upload (set upload_new_dataset to true)


        You can optionally provide a new name for the duplicated batch. If no
        name is provided, the duplicate will be named "[Original Batch Name]
        (Copy)".
      operationId: aiTaskBuilder_DuplicateTaskBuilderBatch
      tags:
        - AiTaskBuilder
      parameters:
        - name: batch_id
          in: path
          description: The unique identifier of the batch to duplicate
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTaskBuilderBatchCreate"
      summary: Duplicate a Batch
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                  description: >-
                    Optional name for the duplicated batch. If not provided, a
                    default name will be generated.
                upload_new_dataset:
                  type: boolean
                  nullable: true
                  description: >-
                    If true, creates the batch without copying the dataset (user
                    must upload a new one). If false or omitted, duplicates with
                    the existing dataset.
  /api/v1/data-collection/batches/{batch_id}/export:
    post:
      description: >-
        Initiates an asynchronous export of all participant responses and
        uploaded files for a batch as a ZIP archive.


        The export is generated out-of-band to handle large batches without
        hitting API timeout limits. The endpoint returns immediately with one of
        two outcomes:


        - **202 Accepted** — a new export job has been enqueued. Use the
        returned `export_id` to poll `GET
        /batches/{batch_id}/export/{export_id}` for status.

        - **200 OK** — a recent export already exists and is ready to download
        immediately.


        Subsequent POST requests for the same batch are idempotent while an
        export is generating or complete; they return the existing job ID or
        download URL rather than re-triggering generation.


        Only researchers with workspace access to the batch can request an
        export.
      operationId: aiTaskBuilder_RequestBatchExport
      tags:
        - AiTaskBuilder
      parameters:
        - name: batch_id
          in: path
          description: The unique identifier of the Batch
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export already complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchExportComplete"
        "403":
          description: ""
          content:
            application/json:
              schema: {}
      summary: Request a Batch Export
      security: *ref_0
  /api/v1/data-collection/batches/{batch_id}/export/{export_id}:
    get:
      description: >-
        Polls the status of an asynchronous batch export job initiated by `POST
        /batches/{batch_id}/export`.


        Returns the current status of the export:


        - **generating** — the export is still being built; continue polling.

        - **complete** — the export is ready; a presigned HTTPS download URL is
        included. URLs are valid for 24 hours and are automatically refreshed if
        expired.

        - **failed** — generation failed (e.g. the archive was deleted from
        storage). Re-send `POST /batches/{batch_id}/export` to retry.
      operationId: aiTaskBuilder_GetBatchExportStatus
      tags:
        - AiTaskBuilder
      parameters:
        - name: batch_id
          in: path
          description: The unique identifier of the Batch
          required: true
          schema:
            type: string
        - name: export_id
          in: path
          description: The export job ID returned by `POST /batches/{batch_id}/export`
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchExportStatus"
        "404":
          description: ""
          content:
            application/json:
              schema: {}
      summary: Get Batch Export Status
      security: *ref_0
