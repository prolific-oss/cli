  /api/v1/credentials/:
    get:
      description: >-
        Retrieve a list of credential pools belonging to a specific workspace.

        Each credential pool summary includes the pool ID, total number of
        credentials, number of available (unredeemed) credentials, and the
        workspace ID.
      operationId: credentials_ListCredentialPools
      tags:
        - Credentials
      parameters:
        - name: workspace_id
          in: query
          description: The workspace ID to filter credential pools by
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential pools retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCredentialPoolsResponse"
        "400":
          description: ""
          content:
            application/json:
              schema: {}
        "403":
          description: ""
          content:
            application/json:
              schema: {}
        "502":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
