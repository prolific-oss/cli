  /api/v1/data-collection/collections/{collection_id}/export:
    post:
      description: >-
        Initiates an asynchronous export of all participant responses and
        uploaded files for a collection as a ZIP archive.


        The export is generated out-of-band to handle large collections without
        hitting API timeout limits. The endpoint returns immediately with one of
        two outcomes:


        - **202 Accepted** — a new export job has been enqueued. Use the
        returned `export_id` to poll `GET
        /collections/{collection_id}/export/{export_id}` for status.

        - **200 OK** — a recent export already exists and is ready to download
        immediately.


        Subsequent POST requests for the same collection are idempotent while an
        export is generating or complete; they return the existing job ID or
        download URL rather than re-triggering generation.


        Only researchers with workspace access to the collection can request an
        export.
      operationId: aiTaskBuilder_RequestCollectionExport
      tags:
        - AiTaskBuilder
      parameters:
        - name: collection_id
          in: path
          description: The unique identifier of the Collection
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export already complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionExportComplete"
        "403":
          description: ""
          content:
            application/json:
              schema: {}
      summary: Request a Collection Export
      security: *ref_0
  /api/v1/data-collection/collections/{collection_id}/export/{export_id}:
    get:
      description: >-
        Polls the status of an asynchronous collection export job initiated by
        `POST /collections/{collection_id}/export`.


        Returns the current status of the export:


        - **generating** — the export is still being built; continue polling.

        - **complete** — the export is ready; a presigned HTTPS download URL is
        included. URLs are valid for 24 hours and are automatically refreshed if
        expired.

        - **failed** — generation failed (e.g. the archive was deleted from
        storage). Re-send `POST /collections/{collection_id}/export` to retry.
      operationId: aiTaskBuilder_GetCollectionExportStatus
      tags:
        - AiTaskBuilder
      parameters:
        - name: collection_id
          in: path
          description: The unique identifier of the Collection
          required: true
          schema:
            type: string
        - name: export_id
          in: path
          description: >-
            The export job ID returned by `POST
            /collections/{collection_id}/export`
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionExportStatus"
        "404":
          description: ""
          content:
            application/json:
              schema: {}
      summary: Get Collection Export Status
      security: *ref_0
