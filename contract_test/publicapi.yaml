    RangeFilterListAttributesMin:
      title: RangeFilterListAttributesMin
      oneOf:
        - type: integer
        - type: number
          format: double
        - type: string
      description: The minimum valid value of the range.
    RangeFilterListAttributesMax:
      title: RangeFilterListAttributesMax
      oneOf:
        - type: integer
        - type: number
          format: double
        - type: string
      description: The maximum valid value of the range.
    RangeFilterListAttributesDataType:
      title: RangeFilterListAttributesDataType
      type: string
      enum:
        - date
        - integer
        - float
      description: >-
        The data type of the range.

        - If the data type is integer, the lower and upper values must be
        integers. Example: `70`.

        - If the data type is date, the lower and upper values must be ISO8601
        dates. Example: `2025-07-11`.

        - If the data type is float, the lower and upper values can be provided
        as floats or integers. Returned values will be floats. Example: `70.5`
        or `80.0`.
    RangeFilterListAttributes:
      title: RangeFilterListAttributes
      type: object
      properties:
        min:
          $ref: "#/components/schemas/RangeFilterListAttributesMin"
          nullable: true
          description: The minimum valid value of the range.
        max:
          $ref: "#/components/schemas/RangeFilterListAttributesMax"
          nullable: true
          description: The maximum valid value of the range.
        data_type:
          $ref: "#/components/schemas/RangeFilterListAttributesDataType"
          nullable: true
          description: >-
            The data type of the range.

            - If the data type is integer, the lower and upper values must be
            integers. Example: `70`.

            - If the data type is date, the lower and upper values must be
            ISO8601 dates. Example: `2025-07-11`.

            - If the data type is float, the lower and upper values can be
            provided as floats or integers. Returned values will be floats.
            Example: `70.5` or `80.0`.
