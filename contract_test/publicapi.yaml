    StudyAccessDetailsProgress:
      title: StudyAccessDetailsProgress
      type: array
      items: {}
    AccessDetailProgress:
      title: AccessDetailProgress
      type: object
      properties:
        external_url:
          type: string
          description: >-
            URL of the task you want to send the participant to. You can pass
            URL search parameters as in `external_study_url`.
        total_allocation:
          type: number
          format: double
          description: >-
            The base number of places set by the researcher for this URL. This
            is the value used to determine the study's total available places
            and will match what was submitted when creating or updating the
            study.


            This value does not include screenout-driven capacity. For studies
            with custom screening (fixed screen-out reward), `allocated` may
            exceed `total_allocation` — use `capacity_increments` to understand
            why.
        allocated:
          type: number
          format: double
          nullable: true
          description: >-
            The number of participants currently allocated to this URL.


            For studies with custom screening (fixed screen-out reward), this
            value may exceed `total_allocation`. This occurs when participants
            have been screened out — each screenout adds 1 to
            `capacity_increments`, allowing a replacement participant to be
            allocated. The relationship is always: `allocated ≤ total_allocation
            + capacity_increments`.
        capacity_increments:
          type: number
          format: double
          nullable: true
          description: >-
            The cumulative number of additional capacity slots added to this URL
            by screenout events. Each time a participant is screened out, this
            value increases by 1, allowing a replacement participant to be
            allocated in their place.


            This field is read-only and system-managed — it cannot be set when
            creating or updating a study. It will be absent (or 0) for URLs
            where no screenouts have occurred.


            **Example:** If `total_allocation` is 10, `capacity_increments` is
            3, and `allocated` is 11, it means 3 participants were screened out,
            creating 3 extra slots, and 11 participants have been allocated in
            total — 2 slots remain.
      required:
        - external_url
        - total_allocation
