    ValidationRuleType:
      title: ValidationRuleType
      type: string
      enum:
        - number
        - string
      description: >-
        The expected input type. When "number", the input must be numeric and
        min/max constrain the numeric value. When "string", the input is treated
        as text and min/max constrain the character count.
    ValidationRule:
      title: ValidationRule
      type: object
      description: Optional validation constraints for input values
      properties:
        type:
          $ref: "#/components/schemas/ValidationRuleType"
          description: >-
            The expected input type. When "number", the input must be numeric
            and min/max constrain the numeric value. When "string", the input is
            treated as text and min/max constrain the character count.
        min:
          type: number
          format: double
          nullable: true
          description: >-
            Minimum value (for type "number") or minimum character count (for
            type "string"). Null means unbounded. When type is "string", must be
            a non-negative integer. If both min and max are provided, min must
            be less than or equal to max.
        max:
          type: number
          format: double
          nullable: true
          description: >-
            Maximum value (for type "number") or maximum character count (for
            type "string"). Null means unbounded. When type is "string", must be
            a non-negative integer. If both min and max are provided, max must
            be greater than or equal to min.
      required:
        - type
