  /api/v1/data-collection/batches/{batch_id}/setup:
    post:
      description: >-
        The setup process creates all of the **tasks** within the batch
        according to your configuration.

        Each datapoint in the dataset is paired with all instructions to create
        a task. Tasks are then organized into task groups.


        The dataset must be in a **READY** status before the setup process can
        be initiated. The dataset can be attached either at batch creation time
        or via the `dataset_id` parameter in this request.


        Upon successful invocation, the setup process will begin asynchronously,
        and the batch will be set to a **PROCESSING** status.


        To retrieve the status of the setup, call the `GET
        /api/v1/data-collection/batches/{batch_id}/status` endpoint.

        The setup is complete once the batch status changes to **READY**.
      operationId: aiTaskBuilder_SetupTaskBuilderBatch
      tags:
        - AiTaskBuilder
      parameters:
        - name: batch_id
          in: path
          description: The unique identifier of the AI Task Builder batch
          required: true
          schema:
            type: string
      responses:
        "204":
          description: ""
      summary: Setup a Batch
      security: *ref_0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dataset_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: >-
                    The ID of the dataset to use for task generation. Optional
                    if a dataset was already attached at batch creation time.
                tasks_per_group:
                  type: integer
                  nullable: true
                  description: >-
                    The number of tasks to randomly assign to each task group.
                    Participants complete one task group per submission.

                    If your dataset includes a META_TASK_GROUP_ID column, those
                    groupings take precedence over this parameter.
